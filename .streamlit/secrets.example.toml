# Copy to .streamlit/secrets.toml for local use.
# In Streamlit Community Cloud, add the same keys under App settings > Secrets.
#
# Keep real S&P Global / Capital IQ credentials out of GitHub.

[spglobal]
# Official S&P Capital IQ API defaults are used when these are empty:
# base_url -> https://api-ciq.marketintelligence.spglobal.com
# token_url -> /gdsapi/rest/authenticate/api/v1/token
# clientservice_url -> /gdsapi/rest/v3/clientservice.json
base_url = ""
token_url = ""
clientservice_url = ""

# Official Capital IQ API token auth uses username/password.
username = ""
password = ""

# Optional: only set these for a custom enterprise universe endpoint.
universe_endpoint = ""
api_key = ""
api_key_header = ""

# Optional: override default Capital IQ mnemonics or map app tickers to Capital IQ identifiers.
ciq_mnemonics = "IQ_COMPANY_NAME,IQ_MARKETCAP,IQ_TOTAL_REV,IQ_EBITDA"
ciq_identifier_map = '{"EUNL.DE":"EUNL:DB","VVSM.DE":"VVSM:DB"}'

timeout = "20"
