# Keep real S&P Global / Capital IQ credentials out of GitHub.

[spglobal]
base_url = "https://your-spglobal-api-host.example"
universe_endpoint = "/your/universe/search/endpoint"

# Use either api_key or username/password.
api_key = ""
api_key_header = ""
token_url = ""
